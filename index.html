<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PORTAL-CV Bapas Jakarta Pusat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.321.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --navy: #001f3f;
            --navy-dark: #000c1a;
            --gold: #FFD700;
            --bg-soft: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-soft);
            color: #1e293b;
            overscroll-behavior-y: contain;
        }

        /* --- Modern Navigation Style --- */
        .step-bubble {
            width: 32px;
            height: 32px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 12px;
            transition: all 0.3s ease;
            border: 2px solid #e2e8f0;
            background: white;
            color: #94a3b8;
        }

        .step-item.active .step-bubble {
            background: var(--navy);
            border-color: var(--navy);
            color: var(--gold);
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 31, 63, 0.2);
        }

        .step-item.completed .step-bubble {
            background: #f0fdf4;
            border-color: #22c55e;
            color: #22c55e;
        }

        /* --- Mobile Preview Slide Up --- */
        @media (max-width: 1023px) {
            #cv-render-area {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: #0f172a;
                z-index: 200;
                transform: translateY(100%);
                transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
                display: flex;
                flex-direction: column;
            }
            #cv-render-area.active { transform: translateY(0); }
            
            .preview-handle {
                width: 40px;
                height: 4px;
                background: rgba(255,255,255,0.2);
                border-radius: 2px;
                margin: 12px auto;
            }
            
            .cv-page {
                transform: scale(0.42);
                transform-origin: top center;
                margin-top: -160mm; /* Menghilangkan whitespace akibat scale */
            }
        }

        /* --- CV Paper Base --- */
        .cv-page {
            width: 210mm;
            min-height: 297mm;
            background: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin: 0 auto 20px auto;
            padding: 15mm;
            box-sizing: border-box;
            font-family: "Times New Roman", serif;
            color: black;
            position: relative;
        }

        @media (min-width: 1024px) {
            .cv-page { transform: scale(0.7); margin-bottom: -80mm; }
        }

        @media (min-width: 1440px) {
            .cv-page { transform: scale(0.9); margin-bottom: -20mm; }
        }

        /* --- Animations --- */
        .fade-step {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="h-screen flex flex-col lg:flex-row overflow-hidden">

    <div id="loading-overlay" class="fixed inset-0 bg-navy-dark z-[999] hidden flex-col items-center justify-center text-white">
        <div class="w-16 h-16 border-4 border-gold border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-bold tracking-widest animate-pulse">GENERATING PDF...</p>
    </div>

    <aside class="w-full lg:w-80 bg-white border-b lg:border-r border-slate-200 flex flex-col z-[150] shadow-sm">
        <div class="p-4 lg:p-6 bg-navy flex lg:flex-col items-center lg:items-start justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center">
                    <img src="https://ui-avatars.com/api/?name=Bapas+Jakpus&background=FFFFFF&color=001f3f&bold=true" class="w-7 h-7">
                </div>
                <div>
                    <h1 class="text-white font-extrabold text-sm tracking-tight">PORTAL CV</h1>
                    <p class="text-gold text-[8px] font-black uppercase tracking-widest">Bapas Jakarta Pusat</p>
                </div>
            </div>
            <button onclick="handleDownload()" class="bg-gold text-navy px-4 py-2 rounded-lg text-[10px] font-black flex items-center gap-2 hover:brightness-110">
                <i data-lucide="download" class="w-3 h-3"></i> UNDUH
            </button>
        </div>

        <nav class="flex-1 overflow-x-auto lg:overflow-y-auto p-4 custom-scroll">
            <div class="flex lg:flex-col gap-4 min-w-max lg:min-w-0">
                <button onclick="switchTab(1)" id="step-1" class="step-item active flex items-center gap-3 group">
                    <div class="step-bubble">1</div>
                    <div class="hidden lg:block text-left">
                        <p class="text-[10px] font-black uppercase text-slate-400 group-[.active]:text-navy">Langkah 1</p>
                        <p class="text-xs font-bold text-slate-500 group-[.active]:text-slate-900">Biodata Diri</p>
                    </div>
                </button>
                <div class="hidden lg:block h-6 w-[2px] bg-slate-100 ml-4"></div>
                <button onclick="switchTab(2)" id="step-2" class="step-item flex items-center gap-3 group">
                    <div class="step-bubble">2</div>
                    <div class="hidden lg:block text-left">
                        <p class="text-[10px] font-black uppercase text-slate-400 group-[.active]:text-navy">Langkah 2</p>
                        <p class="text-xs font-bold text-slate-500 group-[.active]:text-slate-900">Pengalaman</p>
                    </div>
                </button>
                <div class="hidden lg:block h-6 w-[2px] bg-slate-100 ml-4"></div>
                <button onclick="switchTab(3)" id="step-3" class="step-item flex items-center gap-3 group">
                    <div class="step-bubble">3</div>
                    <div class="hidden lg:block text-left">
                        <p class="text-[10px] font-black uppercase text-slate-400 group-[.active]:text-navy">Langkah 3</p>
                        <p class="text-xs font-bold text-slate-500 group-[.active]:text-slate-900">Pendidikan</p>
                    </div>
                </button>
                <div class="hidden lg:block h-6 w-[2px] bg-slate-100 ml-4"></div>
                <button onclick="switchTab(4)" id="step-4" class="step-item flex items-center gap-3 group">
                    <div class="step-bubble">4</div>
                    <div class="hidden lg:block text-left">
                        <p class="text-[10px] font-black uppercase text-slate-400 group-[.active]:text-navy">Langkah 4</p>
                        <p class="text-xs font-bold text-slate-500 group-[.active]:text-slate-900">Organisasi</p>
                    </div>
                </button>
                <div class="hidden lg:block h-6 w-[2px] bg-slate-100 ml-4"></div>
                <button onclick="switchTab(5)" id="step-5" class="step-item flex items-center gap-3 group">
                    <div class="step-bubble">5</div>
                    <div class="hidden lg:block text-left">
                        <p class="text-[10px] font-black uppercase text-slate-400 group-[.active]:text-navy">Langkah 5</p>
                        <p class="text-xs font-bold text-slate-500 group-[.active]:text-slate-900">Keahlian</p>
                    </div>
                </button>
            </div>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto bg-slate-50 relative p-4 lg:p-8 custom-scroll">
        <div class="max-w-3xl mx-auto pb-32">
            
            <div id="panel-1" class="panel-content fade-step space-y-6">
                <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-200">
                    <h2 class="text-xl font-extrabold text-navy mb-6 flex items-center gap-2">
                        <i data-lucide="user-circle"></i> Biodata Diri
                    </h2>
                    
                    <div class="flex flex-col md:flex-row gap-8 items-start">
                        <div class="w-full md:w-auto flex flex-col items-center">
                            <div onclick="document.getElementById('in-photo').click()" class="w-32 h-40 bg-slate-100 rounded-2xl border-2 border-dashed border-slate-300 flex flex-col items-center justify-center cursor-pointer hover:border-navy overflow-hidden group">
                                <img id="photo-preview-el" class="hidden w-full h-full object-cover">
                                <div id="photo-placeholder" class="text-center p-2">
                                    <i data-lucide="camera" class="w-8 h-8 mx-auto text-slate-400 group-hover:scale-110 transition"></i>
                                    <p class="text-[10px] font-bold text-slate-400 mt-2 uppercase">Foto Formal</p>
                                </div>
                            </div>
                            <input type="file" id="in-photo" class="hidden" onchange="handlePhotoUpload(this)">
                            <button onclick="removePhoto()" id="btn-remove-photo" class="hidden mt-3 text-[10px] font-bold text-red-500 uppercase tracking-wider">Hapus Foto</button>
                        </div>

                        <div class="flex-1 grid grid-cols-1 gap-5 w-full">
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Nama Lengkap & Gelar</label>
                                <input type="text" id="in-name" oninput="updateCV()" placeholder="Nama Sesuai Ijazah" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-navy focus:bg-white transition-all outline-none">
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Nomor HP/WA</label>
                                    <input type="text" id="in-phone" oninput="updateCV()" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                                </div>
                                <div>
                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Alamat Email</label>
                                    <input type="email" id="in-email" oninput="updateCV()" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="mt-6">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Domisili Saat Ini</label>
                        <input type="text" id="in-location" oninput="updateCV()" placeholder="Contoh: Gambir, Jakarta Pusat" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                    </div>
                </div>
            </div>

            <div id="panel-2" class="panel-content hidden fade-step space-y-4">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-extrabold text-navy uppercase tracking-tight">Pengalaman Kerja</h2>
                        <button onclick="addEntry('experience')" class="bg-navy text-gold p-2 rounded-lg"><i data-lucide="plus"></i></button>
                    </div>
                    <div id="experience-list" class="space-y-4"></div>
                </div>
            </div>

            <div id="panel-3" class="panel-content hidden fade-step space-y-4">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-extrabold text-navy uppercase tracking-tight">Riwayat Pendidikan</h2>
                        <button onclick="addEntry('education')" class="bg-navy text-gold p-2 rounded-lg"><i data-lucide="plus"></i></button>
                    </div>
                    <div id="education-list" class="space-y-4"></div>
                </div>
            </div>

            <div id="panel-4" class="panel-content hidden fade-step space-y-4">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-extrabold text-navy uppercase tracking-tight">Organisasi</h2>
                        <button onclick="addEntry('organization')" class="bg-navy text-gold p-2 rounded-lg"><i data-lucide="plus"></i></button>
                    </div>
                    <div id="organization-list" class="space-y-4"></div>
                </div>
            </div>

            <div id="panel-5" class="panel-content hidden fade-step space-y-4">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <h2 class="text-xl font-extrabold text-navy uppercase tracking-tight mb-6">Keahlian & Kompetensi</h2>
                    <textarea id="in-skills" oninput="updateCV()" class="w-full h-40 p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:bg-white transition-all" placeholder="Gunakan koma untuk memisahkan keahlian..."></textarea>
                </div>
            </div>

            <div class="fixed bottom-0 left-0 right-0 lg:absolute lg:bottom-10 lg:left-8 lg:right-8 p-4 bg-white/80 backdrop-blur-md lg:bg-transparent flex justify-between gap-4 z-[100]">
                <button id="prevBtn" onclick="switchTab(activeTab - 1)" class="flex-1 lg:flex-none px-8 py-4 rounded-2xl font-bold text-slate-400 bg-slate-100 disabled:opacity-0 transition-all">KEMBALI</button>
                <button id="nextBtn" onclick="activeTab === 5 ? handleDownload() : switchTab(activeTab + 1)" class="flex-[2] lg:flex-none px-12 py-4 rounded-2xl font-black text-navy bg-gold shadow-lg shadow-gold/20 tracking-widest transition-transform active:scale-95 uppercase text-xs">
                    Lanjut
                </button>
            </div>
        </div>
    </main>

    <section id="cv-render-area" class="lg:w-[550px] xl:w-[700px] 2xl:w-[850px] bg-slate-800 lg:border-l border-slate-700 overflow-y-auto custom-scroll p-4">
        <div class="lg:hidden preview-handle"></div>
        <div class="flex items-center justify-between lg:justify-end mb-4 px-2">
            <span class="text-white/50 text-[10px] font-bold uppercase tracking-[0.3em] lg:hidden">Live Preview</span>
            <div class="flex gap-2">
                <button onclick="togglePreview(false)" class="lg:hidden p-2 bg-white/10 rounded-full text-white"><i data-lucide="x"></i></button>
                <div class="hidden lg:flex bg-black/20 p-1 rounded-lg">
                    <button onclick="currentTemplate='classic'; updateCV()" class="px-3 py-1 text-[9px] font-bold rounded-md bg-white/10 text-white">KLASIK</button>
                    <button onclick="currentTemplate='modern'; updateCV()" class="px-3 py-1 text-[9px] font-bold rounded-md text-white/40 hover:text-white">MODERN</button>
                </div>
            </div>
        </div>
        <div id="pages-container" class="pb-24"></div>
    </section>

    <button onclick="togglePreview(true)" class="lg:hidden fixed bottom-24 right-6 w-14 h-14 bg-navy text-gold rounded-full shadow-2xl flex items-center justify-center z-[160] active:scale-90 transition-transform">
        <i data-lucide="eye"></i>
    </button>

    <script>
        // Data & State
        let activeTab = 1;
        let currentTemplate = 'classic';
        let userPhotoBase64 = null;
        const data = { experience: [], education: [], organization: [] };

        function switchTab(step) {
            if (step < 1 || step > 5) return;
            activeTab = step;
            
            // UI Updates
            document.querySelectorAll('.panel-content').forEach(p => p.classList.add('hidden'));
            document.getElementById(`panel-${step}`).classList.remove('hidden');
            
            document.querySelectorAll('.step-item').forEach((el, idx) => {
                const i = idx + 1;
                el.classList.toggle('active', i === step);
                el.classList.toggle('completed', i < step);
            });

            // Button Control
            document.getElementById('prevBtn').disabled = step === 1;
            document.getElementById('nextBtn').innerText = step === 5 ? 'UNDUH PDF' : 'LANJUT';
            
            lucide.createIcons();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function togglePreview(show) {
            document.getElementById('cv-render-area').classList.toggle('active', show);
        }

        // Logic Input (Sama dengan sebelumnya namun dengan UI baru)
        function handlePhotoUpload(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    userPhotoBase64 = e.target.result;
                    document.getElementById('photo-preview-el').src = userPhotoBase64;
                    document.getElementById('photo-preview-el').classList.remove('hidden');
                    document.getElementById('photo-placeholder').classList.add('hidden');
                    document.getElementById('btn-remove-photo').classList.remove('hidden');
                    updateCV();
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function removePhoto() {
            userPhotoBase64 = null;
            document.getElementById('photo-preview-el').classList.add('hidden');
            document.getElementById('photo-placeholder').classList.remove('hidden');
            document.getElementById('btn-remove-photo').classList.add('hidden');
            updateCV();
        }

        function addEntry(type) {
            data[type].push({ id: Date.now(), title: '', subtitle: '', date: '', desc: '' });
            renderList(type);
            updateCV();
        }

        function renderList(type) {
            const container = document.getElementById(`${type}-list`);
            container.innerHTML = '';
            data[type].forEach(item => {
                const div = document.createElement('div');
                div.className = "p-4 bg-slate-50 rounded-2xl border border-slate-200 relative group animate-in slide-in-from-top-2";
                div.innerHTML = `
                    <button onclick="removeEntry('${type}', ${item.id})" class="absolute top-2 right-2 text-slate-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    <div class="grid gap-3">
                        <input type="text" placeholder="Instansi" value="${item.title}" oninput="updateField('${type}', ${item.id}, 'title', this.value)" class="w-full bg-transparent font-bold border-b border-slate-200 outline-none focus:border-navy text-sm">
                        <div class="flex gap-2">
                            <input type="text" placeholder="Posisi" value="${item.subtitle}" oninput="updateField('${type}', ${item.id}, 'subtitle', this.value)" class="flex-1 bg-transparent border-b border-slate-200 outline-none text-xs">
                            <input type="text" placeholder="Tahun" value="${item.date}" oninput="updateField('${type}', ${item.id}, 'date', this.value)" class="w-24 bg-transparent border-b border-slate-200 outline-none text-xs">
                        </div>
                        <textarea placeholder="Deskripsi singkat..." oninput="updateField('${type}', ${item.id}, 'desc', this.value)" class="w-full bg-white/50 p-2 rounded-lg text-[10px] h-16 outline-none">${item.desc}</textarea>
                    </div>
                `;
                container.appendChild(div);
            });
            lucide.createIcons();
        }

        function updateField(type, id, field, val) {
            const item = data[type].find(i => i.id === id);
            if(item) item[field] = val;
            updateCV();
        }

        function removeEntry(type, id) {
            data[type] = data[type].filter(i => i.id !== id);
            renderList(type);
            updateCV();
        }

        // Render Engine CV
        function updateCV() {
            const container = document.getElementById('pages-container');
            container.innerHTML = '';
            
            const page = document.createElement('div');
            page.className = "cv-page";
            
            const name = document.getElementById('in-name').value || 'NAMA LENGKAP';
            const phone = document.getElementById('in-phone').value || '+62 8xx';
            const email = document.getElementById('in-email').value || 'email@anda.com';
            const loc = document.getElementById('in-location').value || 'Jakarta';
            const skills = document.getElementById('in-skills').value;

            let headerHTML = `
                <div style="text-align:center; border-bottom:2px solid black; padding-bottom:10px; margin-bottom:20px">
                    <h1 style="margin:0; font-size:22pt; text-transform:uppercase">${name}</h1>
                    <p style="margin:5px 0 0 0; font-size:10pt">${phone} | ${email} | ${loc}</p>
                </div>
            `;

            if(currentTemplate === 'modern' && userPhotoBase64) {
                headerHTML = `
                    <div style="display:flex; gap:20px; border-bottom:2px solid black; padding-bottom:20px; margin-bottom:20px">
                        <img src="${userPhotoBase64}" style="width:100px; height:130px; object-fit:cover; border:1px solid #ddd">
                        <div style="flex:1">
                            <h1 style="margin:0; font-size:22pt; text-transform:uppercase">${name}</h1>
                            <p style="margin:10px 0; font-size:10pt"><b>Telepon:</b> ${phone}</p>
                            <p style="margin:5px 0; font-size:10pt"><b>Email:</b> ${email}</p>
                            <p style="margin:5px 0; font-size:10pt"><b>Lokasi:</b> ${loc}</p>
                        </div>
                    </div>
                `;
            }

            let bodyHTML = "";
            const sections = [
                { t: 'Pengalaman Kerja', k: 'experience' },
                { t: 'Riwayat Pendidikan', k: 'education' },
                { t: 'Organisasi', k: 'organization' }
            ];

            sections.forEach(s => {
                if(data[s.k].length > 0) {
                    bodyHTML += `<div style="border-bottom:1px solid #000; font-weight:bold; text-transform:uppercase; margin-top:15px; margin-bottom:10px">${s.t}</div>`;
                    data[s.k].forEach(item => {
                        bodyHTML += `
                            <div style="margin-bottom:10px">
                                <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:11pt">
                                    <span>${item.title || 'Instansi'}</span>
                                    <span>${item.date}</span>
                                </div>
                                <div style="font-style:italic; font-size:10pt">${item.subtitle}</div>
                                <div style="font-size:10pt; text-align:justify; margin-top:2px">${item.desc}</div>
                            </div>
                        `;
                    });
                }
            });

            if(skills) {
                bodyHTML += `
                    <div style="border-bottom:1px solid #000; font-weight:bold; text-transform:uppercase; margin-top:15px; margin-bottom:5px">Keahlian & Kompetensi</div>
                    <div style="font-size:10pt; line-height:1.4">${skills}</div>
                `;
            }

            page.innerHTML = headerHTML + bodyHTML;
            container.appendChild(page);
        }

        async function handleDownload() {
            const overlay = document.getElementById('loading-overlay');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            
            const element = document.getElementById('pages-container');
            const name = document.getElementById('in-name').value || 'CV_User';
            
            const opt = {
                margin: 0,
                filename: `CV_BapasJakpus_${name}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 3, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            try {
                await html2pdf().set(opt).from(element).save();
            } finally {
                overlay.classList.add('hidden');
            }
        }

        window.onload = () => {
            lucide.createIcons();
            updateCV();
        };
    </script>
</body>
</html>
